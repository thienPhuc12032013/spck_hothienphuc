<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet" href="login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- BG -->
<div class="bg">

  <div class="slide active"
  style="background-image:url('https://images.unsplash.com/photo-1520975693411-b5d1b8c4b9c8');">
  </div>

  <div class="slide"
  style="background-image:url('https://images.unsplash.com/photo-1518770660439-4636190af475');">
  </div>

</div>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- BOX -->
<div class="box">

  <div class="logo">
    Log<span>in</span>
  </div>

  <div class="sub">
    Đăng nhập để tiếp tục
  </div>

  <!-- ERROR -->
  <div class="error" id="errorText"></div>

  <!-- USER -->
  <div class="input-group">
    <input id="user" type="text" placeholder="Username">
    <i class="fa fa-user left-icon"></i>
  </div>

  <!-- PASS -->
  <div class="input-group">

    <input id="pass"
    type="password"
    placeholder="Mật khẩu">

    <i class="fa fa-lock left-icon"></i>

    <i class="fa fa-eye show-pass"
    onclick="togglePass()"></i>

  </div>

  <!-- BTN -->
  <button class="btn" onclick="login()">
    Đăng nhập
  </button>

  <!-- LINK -->
  <div class="link">
    Chưa có tài khoản?
    <a href="register.html">Đăng ký</a>
  </div>

</div>

<script src="login.js"></script>

</body>
</html>
