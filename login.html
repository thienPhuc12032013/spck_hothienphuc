<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
}

/* BG */
.bg{position:absolute;inset:0;}
.slide{
  position:absolute;width:100%;height:100%;
  background-size:cover;background-position:center;
  opacity:0;transition:1.2s;
  filter: blur(5px) brightness(0.45);
  transform: scale(1.1);
}
.active{opacity:1;}

.overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.6);
}

/* BOX */
.box{
  width:360px;
  padding:32px;
  border-radius:20px;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
  text-align:center;
  z-index:2;
  animation:fadeUp .7s ease;
}

@keyframes fadeUp{
  from{transform:translateY(40px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* TEXT */
.logo{font-size:34px;font-weight:800;}
.logo span{color:#ff0050;}
.sub{font-size:13px;color:#aaa;margin:10px 0 20px;}

.error{
  color:#ff4d6d;
  font-size:12px;
  margin-bottom:10px;
  display:none;
}

/* INPUT */
.input-group{
  position:relative;
  margin-bottom:14px;
  height:44px;
}

/* ICON USER + LOCK (CŨ GIỮ NGUYÊN) */
.left-icon{
  position:absolute;
  right:40px;
  top:50%;
  transform:translateY(-50%);
  color:#888;
}

/* ICON EYE */
.show-pass{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  color:#888;
  cursor:pointer;
}

/* INPUT */
.input-group input{
  width:100%;
  height:100%;
  padding:0 70px 0 14px;
  border-radius:12px;
  border:1px solid #222;
  background:#111;
  color:white;
}

/* BTN */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(270deg,#ff0050,#ff4d6d,#ff0050);
  background-size:200% 200%;
  animation:move 3s infinite;
}

@keyframes move{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

/* LINK */
.link{margin-top:14px;font-size:12px;color:#aaa;}
.link a{color:#ff0050;text-decoration:none;}
</style>
</head>

<body>

<!-- BG (CŨ GIỮ NGUYÊN) -->
<div class="bg">
  <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1520975693411-b5d1b8c4b9c8');"></div>
  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1518770660439-4636190af475');"></div>
</div>

<div class="overlay"></div>

<!-- BOX -->
<div class="box">
  <div class="logo">Log<span>in</span></div>
  <div class="sub">Đăng nhập để tiếp tục</div>

  <div class="error" id="errorText"></div>

  <div class="input-group">
    <input id="user" placeholder="Username">
    <i class="fa fa-user left-icon"></i>
  </div>

  <div class="input-group">
    <input id="pass" type="password" placeholder="Mật khẩu">
    <i class="fa fa-lock left-icon"></i>
    <i class="fa fa-eye show-pass" onclick="togglePass()"></i>
  </div>

  <button class="btn" onclick="login()">Đăng nhập</button>

  <div class="link">
    Chưa có tài khoản? <a href="register.html">Đăng ký</a>
  </div>
</div>

<script>

/* ===== BG (CŨ) ===== */
let slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
  slides[i].classList.remove("active");
  i=(i+1)%slides.length;
  slides[i].classList.add("active");
},4000);

/* ===== SHOW PASS (CŨ) ===== */
function togglePass(){
  let p=document.getElementById("pass");
  let icon=document.querySelector(".show-pass");

  if(p.type==="password"){
    p.type="text";
    icon.classList.replace("fa-eye","fa-eye-slash");
  }else{
    p.type="password";
    icon.classList.replace("fa-eye-slash","fa-eye");
  }
}

/* ===== LOGIN (CŨ + MỚI FIX FULL) ===== */
function login(){

  let u=user.value.trim();
  let p=pass.value.trim();

  let savedUser = localStorage.getItem("user");
  let savedPass = localStorage.getItem("pass");

  let error = document.getElementById("errorText");

  error.style.display="none";

  // ❌ chưa nhập
  if(!u || !p){
    error.innerText="⚠️ Nhập đầy đủ thông tin!";
    error.style.display="block";
    return;
  }

  // ❌ chưa có account
  if(!savedUser || !savedPass){
    error.innerText="⚠️ Chưa có tài khoản!";
    error.style.display="block";
    return;
  }

  // ❌ sai
  if(u !== savedUser || p !== savedPass){
    error.innerText="❌ Sai tài khoản hoặc mật khẩu!";
    error.style.display="block";
    return;
  }

  // ✅ đúng
  localStorage.setItem("isLogin","true");
  localStorage.setItem("currentUser",u);

  alert("Đăng nhập thành công!");

  window.location.href="main.html";
}

</script>

</body>
</html>
