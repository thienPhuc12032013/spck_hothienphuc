<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  overflow:hidden;
}

/* BG */
.bg{position:absolute;inset:0;}
.slide{
  position:absolute;width:100%;height:100%;
  background-size:cover;background-position:center;
  opacity:0;transition:1.2s;
  filter:blur(5px) brightness(0.45);
  transform:scale(1.1);
}
.active{opacity:1;}

.overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.6);
}

/* BOX */
.box{
  width:360px;
  padding:32px;
  border-radius:20px;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
  text-align:center;
  z-index:2;
}

.logo{font-size:32px;font-weight:800;}
.logo span{color:#ff0050;}

.sub{font-size:13px;color:#aaa;margin:10px 0 20px;}

.error{color:#ff4d6d;font-size:12px;margin-bottom:10px;display:none;}
.success{color:#00ffae;font-size:12px;margin-bottom:10px;display:none;}

/* INPUT */
.input-group{
  position:relative;
  margin-bottom:14px;
}

.input-group input{
  width:100%;
  padding:12px 40px 12px 12px;
  border-radius:12px;
  border:1px solid #222;
  background:#111;
  color:white;
}

/* ICON */
.right-icon{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  color:#888;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.btn-reg{
  background:linear-gradient(270deg,#ff0050,#ff4d6d,#ff0050);
  background-size:200% 200%;
  animation:move 3s infinite;
}

.btn-login{
  background:#38bdf8;
  color:black;
}

@keyframes move{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}
</style>
</head>

<body>

<div class="bg">
  <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1520975693411-b5d1b8c4b9c8');"></div>
  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1518770660439-4636190af475');"></div>
</div>

<div class="overlay"></div>

<div class="box">
  <div class="logo">Reg<span>ister</span></div>
  <div class="sub">Tạo tài khoản mới</div>

  <div class="error" id="errorText"></div>
  <div class="success" id="successText">✔ Đăng ký thành công!</div>

  <div class="input-group">
    <input id="user" placeholder="Username">
    <i class="fa fa-user right-icon"></i>
  </div>

  <div class="input-group">
    <input id="email" placeholder="Email">
    <i class="fa fa-envelope right-icon"></i>
  </div>

  <div class="input-group">
    <input id="pass" type="password" placeholder="Mật khẩu">
    <i class="fa fa-lock right-icon"></i>
  </div>

  <div class="input-group">
    <input id="confirm" type="password" placeholder="Nhập lại mật khẩu">
    <i class="fa fa-lock right-icon"></i>
  </div>

  <!-- 🔥 BUTTON CŨ -->
  <button class="btn btn-reg" onclick="register()">Đăng ký</button>

  <!-- 🔥 BUTTON MỚI (CHUYỂN TRANG) -->
  <button class="btn btn-login" onclick="goLogin()">Đi tới Login</button>

</div>

<script>

/* BG */
let slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
  slides[i].classList.remove("active");
  i=(i+1)%slides.length;
  slides[i].classList.add("active");
},4000);

/* REGISTER (CŨ + LOCALSTORAGE) */
function register(){

  let u=document.getElementById("user").value.trim();
  let e=document.getElementById("email").value.trim();
  let p=document.getElementById("pass").value;
  let c=document.getElementById("confirm").value;

  let error=document.getElementById("errorText");
  let success=document.getElementById("successText");

  error.style.display="none";
  success.style.display="none";

  if(!u || !e || !p || !c){
    error.innerText="⚠️ Nhập đủ!";
    error.style.display="block";
    return;
  }

  if(p !== c){
    error.innerText="❌ Không khớp!";
    error.style.display="block";
    return;
  }

  localStorage.setItem("user",u);
  localStorage.setItem("email",e);
  localStorage.setItem("pass",p);

  success.style.display="block";

  setTimeout(()=>{
    window.location.href="login.html";
  },1000);
}

/* 🔥 MỚI: NÚT CHUYỂN TRANG */
function goLogin(){
  window.location.href="login.html";
}

</script>

</body>
</html>
