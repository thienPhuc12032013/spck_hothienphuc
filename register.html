<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link rel="stylesheet" href="register.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="bg">
  <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1520975693411-b5d1b8c4b9c8');"></div>
  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1518770660439-4636190af475');"></div>
</div>

<div class="overlay"></div>

<div class="box">
  <div class="logo">Reg<span>ister</span></div>
  <div class="sub">Tạo tài khoản mới</div>

  <div class="error" id="errorText"></div>
  <div class="success" id="successText">✔ Đăng ký thành công!</div>

  <div class="input-group">
    <input id="user" placeholder="Username">
    <i class="fa fa-user right-icon"></i>
  </div>

  <div class="input-group">
    <input id="email" placeholder="Email">
    <i class="fa fa-envelope right-icon"></i>
  </div>

  <div class="input-group">
    <input id="pass" type="password" placeholder="Mật khẩu">
    <i class="fa fa-lock right-icon"></i>
  </div>

  <div class="input-group">
    <input id="confirm" type="password" placeholder="Nhập lại mật khẩu">
    <i class="fa fa-lock right-icon"></i>
  </div>

  <button class="btn btn-reg" onclick="register()">Đăng ký</button>
  <button class="btn btn-login" onclick="goLogin()">Đi tới Login</button>

</div>

<script>

// BG
let slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
  slides[i].classList.remove("active");
  i=(i+1)%slides.length;
  slides[i].classList.add("active");
},4000);

// REGISTER
function register(){

  let u=document.getElementById("user").value.trim();
  let e=document.getElementById("email").value.trim();
  let p=document.getElementById("pass").value;
  let c=document.getElementById("confirm").value;

  let error=document.getElementById("errorText");
  let success=document.getElementById("successText");

  error.style.display="none";
  success.style.display="none";

  if(!u || !e || !p || !c){
    error.innerText="⚠️ Nhập đủ!";
    error.style.display="block";
    return;
  }

  if(p !== c){
    error.innerText="❌ Không khớp!";
    error.style.display="block";
    return;
  }

  // ⚡ nâng cấp: lưu nhiều user
  let users = JSON.parse(localStorage.getItem("users")) || [];

  // check trùng username
  if(users.find(x => x.user === u)){
    error.innerText="❌ Username đã tồn tại!";
    error.style.display="block";
    return;
  }

  users.push({user:u,email:e,pass:p});
  localStorage.setItem("users", JSON.stringify(users));

  success.style.display="block";

  setTimeout(()=>{
    window.location.href="login.html";
  },1000);
}

// GO LOGIN
function goLogin(){
  window.location.href="login.html";
}

</script>

</body>
</html>
