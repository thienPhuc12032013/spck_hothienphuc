<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  overflow:hidden;
}

/* BG */
.bg{position:absolute;inset:0;}
.slide{
  position:absolute;width:100%;height:100%;
  background-size:cover;background-position:center;
  opacity:0;transition:1.2s;
  filter:blur(5px) brightness(0.45);
  transform:scale(1.1);
}
.active{opacity:1;}

.overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.6);
}

/* BOX */
.box{
  width:360px;padding:32px;border-radius:20px;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.08);
  color:white;text-align:center;z-index:2;
  animation:fadeUp .7s ease;
}

@keyframes fadeUp{
  from{transform:translateY(40px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* LOGO */
.logo{font-size:32px;font-weight:800;}
.logo span{color:#ff0050;}

.sub{font-size:13px;color:#aaa;margin:10px 0 20px;}

.error{color:#ff4d6d;font-size:12px;margin-bottom:10px;display:none;}
.success{color:#00ffae;font-size:12px;margin-bottom:10px;display:none;}

/* INPUT */
.input-group{position:relative;margin-bottom:14px;}
.input-group i{
  position:absolute;left:12px;top:50%;
  transform:translateY(-50%);color:#888;
}

.input-group input{
  width:100%;padding:12px 38px;border-radius:12px;
  border:1px solid #222;background:#111;color:white;
  transition:.3s;
}

.input-group input:focus{
  border-color:#ff0050;
  box-shadow:0 0 10px rgba(255,0,80,0.4);
}

.show-pass{
  position:absolute;right:12px;top:50%;
  transform:translateY(-50%);
  cursor:pointer;color:#888;
}

/* PASSWORD STRENGTH */
.strength{
  height:5px;
  border-radius:5px;
  background:#222;
  margin-top:5px;
  overflow:hidden;
}
.strength div{
  height:100%;
  width:0%;
  transition:.3s;
}

/* BTN */
.btn{
  width:100%;padding:12px;border:none;border-radius:12px;
  color:white;font-weight:bold;cursor:pointer;
  background:linear-gradient(270deg,#ff0050,#ff4d6d,#ff0050);
  background-size:200% 200%;
  animation:move 3s infinite;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(255,0,80,0.5);
}

.btn.loading{
  opacity:0.7;
  pointer-events:none;
}

/* LINK */
.link{margin-top:14px;font-size:12px;color:#aaa;}
.link a{color:#ff0050;text-decoration:none;}
</style>
</head>

<body>

<div class="bg">
  <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1520975693411-b5d1b8c4b9c8');"></div>
  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1518770660439-4636190af475');"></div>
</div>

<div class="overlay"></div>

<div class="box">
  <div class="logo">Reg<span>ister</span></div>
  <div class="sub">Tạo tài khoản mới</div>

  <div class="error" id="errorText"></div>
  <div class="success" id="successText">✔ Đăng ký thành công!</div>

  <div class="input-group">
    <i class="fa fa-user"></i>
    <input id="user" placeholder="Username">
  </div>

  <div class="input-group">
    <i class="fa fa-envelope"></i>
    <input id="email" placeholder="Email">
  </div>

  <div class="input-group">
    <i class="fa fa-lock"></i>
    <input id="pass" type="password" placeholder="Mật khẩu" oninput="checkStrength()">
    <i class="fa fa-eye show-pass" onclick="togglePass('pass', this)"></i>
  </div>

  <div class="strength"><div id="bar"></div></div>

  <div class="input-group">
    <i class="fa fa-lock"></i>
    <input id="confirm" type="password" placeholder="Nhập lại mật khẩu">
    <i class="fa fa-eye show-pass" onclick="togglePass('confirm', this)"></i>
  </div>

  <button class="btn" id="btn" onclick="register()">Đăng ký</button>

  <div class="link">
    Đã có tài khoản? <a href="login.html">Đăng nhập</a>
  </div>
</div>

<script>
// BG
let slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
  slides[i].classList.remove("active");
  i=(i+1)%slides.length;
  slides[i].classList.add("active");
},4000);

// ENTER SUBMIT
document.addEventListener("keydown",e=>{
  if(e.key==="Enter") register();
});

// PASS SHOW
function togglePass(id,icon){
  let input=document.getElementById(id);
  if(input.type==="password"){
    input.type="text";
    icon.classList.replace("fa-eye","fa-eye-slash");
  }else{
    input.type="password";
    icon.classList.replace("fa-eye-slash","fa-eye");
  }
}

// PASSWORD STRENGTH
function checkStrength(){
  let p=pass.value;
  let bar=document.getElementById("bar");

  let strength=0;
  if(p.length>=6) strength++;
  if(/[A-Z]/.test(p)) strength++;
  if(/[0-9]/.test(p)) strength++;
  if(/[^A-Za-z0-9]/.test(p)) strength++;

  let width=strength*25;
  bar.style.width=width+"%";

  if(width<=25) bar.style.background="red";
  else if(width<=50) bar.style.background="orange";
  else if(width<=75) bar.style.background="yellow";
  else bar.style.background="lime";
}

// EMAIL CHECK
function isEmail(e){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
}

// REGISTER
function register(){
  let u=user.value.trim();
  let e=email.value.trim();
  let p=pass.value;
  let c=confirm.value;
  let error=errorText;
  let success=successText;
  let btn=document.getElementById("btn");

  error.style.display="none";
  success.style.display="none";

  if(!u||!e||!p||!c){
    error.innerText="⚠️ Nhập đầy đủ!";
    error.style.display="block";return;
  }

  if(!isEmail(e)){
    error.innerText="❌ Email sai!";
    error.style.display="block";return;
  }

  if(p.length<6){
    error.innerText="❌ Mật khẩu ≥ 6 ký tự!";
    error.style.display="block";return;
  }

  if(p!==c){
    error.innerText="❌ Không khớp!";
    error.style.display="block";return;
  }

  btn.classList.add("loading");

  setTimeout(()=>{
    btn.classList.remove("loading");

    localStorage.setItem("user",u);
    localStorage.setItem("pass",p);

    success.style.display="block";

    setTimeout(()=>{
      window.location.href="login.html";
    },1200);

  },1000);
}
</script>

</body>
</html>
