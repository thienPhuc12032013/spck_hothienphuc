<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link rel="stylesheet" href="register.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- BG -->
<div class="bg">

  <div class="slide active"
  style="background-image:url('https://images.unsplash.com/photo-1520975693411-b5d1b8c4b9c8');">
  </div>

  <div class="slide"
  style="background-image:url('https://images.unsplash.com/photo-1518770660439-4636190af475');">
  </div>

</div>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- BOX -->
<div class="box">

  <div class="logo">
    Reg<span>ister</span>
  </div>

  <div class="sub">
    Tạo tài khoản mới
  </div>

  <div class="error" id="errorText"></div>

  <div class="success" id="successText">
    ✔ Đăng ký thành công!
  </div>

  <!-- USER -->
  <div class="input-group">
    <input id="user" type="text" placeholder="Username">
    <i class="fa fa-user right-icon"></i>
  </div>

  <!-- EMAIL -->
  <div class="input-group">
    <input id="email" type="email" placeholder="Email">
    <i class="fa fa-envelope right-icon"></i>
  </div>

  <!-- PASS -->
  <div class="input-group">
    <input id="pass" type="password" placeholder="Mật khẩu">
    <i class="fa fa-lock right-icon"></i>
  </div>

  <!-- CONFIRM -->
  <div class="input-group">
    <input id="confirm" type="password" placeholder="Nhập lại mật khẩu">
    <i class="fa fa-lock right-icon"></i>
  </div>

  <!-- BTN -->
  <button class="btn btn-reg" onclick="register()">
    Đăng ký
  </button>

  <button class="btn btn-login" onclick="goLogin()">
    Đi tới Login
  </button>

</div>

<script src="register.js"></script>

</body>
</html>
