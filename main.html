<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI";
}

body{
  background:#0f172a;
  color:white;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#020617;
  position:sticky;
  top:0;
}

.logo{
  font-size:22px;
  font-weight:bold;
  color:#38bdf8;
}

.user{
  font-size:14px;
  color:#aaa;
}

.logout{
  background:#ef4444;
  padding:8px 15px;
  border-radius:8px;
  cursor:pointer;
}

/* CONTAINER */
.container{
  width:500px;
  margin:30px auto;
}

/* POST BOX */
.post-box{
  background:#020617;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

.post-box textarea{
  width:100%;
  height:80px;
  background:#0f172a;
  border:none;
  outline:none;
  color:white;
  padding:10px;
  border-radius:8px;
  resize:none;
}

.post-box button{
  margin-top:10px;
  padding:8px 15px;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* POST */
.post{
  background:#020617;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}
</style>

</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">MySocial</div>

  <div class="user" id="userBox">User</div>

  <div class="logout" onclick="logout()">Logout</div>
</div>

<!-- MAIN -->
<div class="container">

  <!-- POST -->
  <div class="post-box">
    <textarea id="content" placeholder="Bạn đang nghĩ gì?"></textarea>
    <button onclick="addPost()">Đăng</button>
  </div>

  <!-- FEED -->
  <div id="feed"></div>

</div>

<script>

// 🔥 CHECK LOGIN
if(localStorage.getItem("isLogin") !== "true"){
  window.location.href = "login.html";
}

// 🔥 HIỂN THỊ USER
let currentUser = localStorage.getItem("currentUser");
document.getElementById("userBox").innerText = "Xin chào, " + currentUser;

// 🔥 LOAD POST
window.onload = function(){
  loadPosts();
}

// 🔥 ADD POST
function addPost(){
  let content = document.getElementById("content").value;

  if(content.trim() === ""){
    alert("Nhập nội dung!");
    return;
  }

  let posts = JSON.parse(localStorage.getItem("posts")) || [];

  posts.unshift({
    user: currentUser,
    text: content
  });

  localStorage.setItem("posts", JSON.stringify(posts));

  document.getElementById("content").value = "";

  loadPosts();
}

// 🔥 LOAD POST
function loadPosts(){
  let feed = document.getElementById("feed");
  let posts = JSON.parse(localStorage.getItem("posts")) || [];

  feed.innerHTML = "";

  posts.forEach(p => {
    feed.innerHTML += `
      <div class="post">
        <h4>${p.user}</h4>
        <p>${p.text}</p>
      </div>
    `;
  });
}

// 🔥 LOGOUT
function logout(){
  localStorage.removeItem("isLogin");
  localStorage.removeItem("currentUser");

  window.location.href = "login.html";
}

</script>

</body>
</html>
